<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فريق سبيكتروم للميكاترونكس</title>
<link rel="icon" type="image/x-icon" href="Favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #050A18;
    --navy2: #0A1428;
    --navy3: #0F1E3A;
    --cyan: #29B8D8;
    --cyan2: #1A9EBD;
    --cyan-glow: rgba(41, 184, 216, 0.15);
    --white: #E8EDF5;
    --white2: #B0BDD4;
    --coral: #FF6B6B;
    --glass: rgba(255,255,255,0.04);
    --glass-border: rgba(41,184,216,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--navy);
    color: var(--white);
    direction: rtl;
    overflow-x: hidden;
  }

  #cursor-glow {
    position: fixed;
    width: 300px; height: 300px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(41,184,216,0.09) 0%, rgba(41,184,216,0.03) 45%, transparent 70%);
    transition: left 0.03s linear, top 0.03s linear;
    mix-blend-mode: screen;
  }

  nav {
    position: fixed; top: 0; right: 0; left: 0; z-index: 1000;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 2rem;
    height: 70px;
    background: rgba(5, 10, 24, 0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--glass-border);
    transition: all 0.3s ease;
  }
  nav.scrolled {
    height: 60px;
    background: rgba(5, 10, 24, 0.97);
  }
  .nav-logo {
    display: flex;
    align-items: center;
  }
  .nav-logo img {
    height: 48px;
    object-fit: contain;
    filter: drop-shadow(0 0 8px rgba(41,184,216,0.4));
  }
  .nav-links {
    display: flex; align-items: center; gap: 0.15rem;
    list-style: none;
  }
  .nav-links a {
    color: var(--white2);
    text-decoration: none;
    font-family: 'Cairo', sans-serif;
    font-size: 0.83rem;
    font-weight: 600;
    padding: 0.4rem 0.65rem;
    border-radius: 6px;
    transition: color 0.2s, background 0.2s;
    white-space: nowrap;
  }
  .nav-links a:hover { color: var(--cyan); background: var(--cyan-glow); }
  .nav-links a.active { color: var(--cyan); }
  
  .nav-members-wrap {
    display: flex;
    align-items: center;
  }
  .btn-members {
    background: var(--cyan);
    color: var(--navy) !important;
    font-family: 'Cairo', sans-serif;
    font-weight: 700 !important;
    font-size: 0.9rem;
    border-radius: 8px;
    padding: 0.5rem 1.2rem;
    text-decoration: none;
    transition: background 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 16px rgba(41,184,216,0.3);
    white-space: nowrap;
    display: inline-block;
  }
  .btn-members:hover {
    background: var(--cyan2) !important;
    box-shadow: 0 0 24px rgba(41,184,216,0.5) !important;
  }
  
  .hamburger { 
    display: none; 
    flex-direction: column; 
    gap: 5px; 
    cursor: pointer; 
    z-index: 1001;
  }
  .hamburger span { width: 24px; height: 2px; background: var(--white); border-radius: 2px; transition: 0.3s; }
  
  .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

  #hero {
    position: relative;
    height: 100vh;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  #hero-video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0.55;
    z-index: 0;
  }
  .hero-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(5,10,24,0.3) 0%, rgba(5,10,24,0.5) 60%, var(--navy) 100%);
    z-index: 1;
  }
  .hero-content {
    position: relative; z-index: 2;
    text-align: center;
    padding: 0 1.5rem;
    animation: fadeUp 1s ease both;
    animation-delay: 0.3s;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(30px); }
    to { opacity:1; transform:translateY(0); }
  }
  .hero-eyebrow {
    font-family: 'Cairo', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 1rem;
  }
  .hero-title {
    font-family: 'Cairo', sans-serif;
    font-size: clamp(2.8rem, 7vw, 5.5rem);
    font-weight: 900;
    line-height: 1.1;
    color: #fff;
    text-shadow: 0 0 40px rgba(41,184,216,0.25);
    margin-bottom: 1.2rem;
  }
  .hero-title span { color: var(--cyan); }
  .hero-sub {
    font-size: clamp(1rem, 2.5vw, 1.25rem);
    color: var(--white2);
    max-width: 560px; margin: 0 auto 2.5rem;
    line-height: 1.8;
  }
  .hero-cta {
    display: inline-flex; gap: 1rem; flex-wrap: wrap; justify-content: center;
  }
  .btn-primary {
    background: var(--cyan);
    color: var(--navy);
    font-family: 'Cairo', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    padding: 0.85rem 2.2rem;
    border-radius: 10px;
    text-decoration: none;
    border: none; cursor: pointer;
    box-shadow: 0 0 24px rgba(41,184,216,0.4);
    transition: all 0.25s;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 32px rgba(41,184,216,0.55); }
  .btn-outline {
    background: transparent;
    color: var(--white);
    font-family: 'Cairo', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    padding: 0.85rem 2.2rem;
